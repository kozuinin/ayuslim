<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYU SLIM</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Serif JP', serif;
    background:#f6f2eb;
    color:#2f2f2f;
}

/* ヘッダー */
header{
    position:fixed;
    top:0;
    width:100%;
    height:140px;
    padding:0 80px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:wheat;
    z-index:1000;
}

.logo img{
    height:125px;
}

.header-center{
    position:absolute;
    left:16.5%;
    top:50%;
    transform:translateY(-50%);
}

.main-title{
    font-size:33px;
    font-weight:700;
}

.sub-title{
    font-size:27px;
    font-weight:700;
}

.certification{
    font-size:15px;
}

nav{
    font-size:25px;
}

nav a{
    color:#444;
    text-decoration:none;
}

/* セクション */
.section{
    padding:200px 20px 100px;
    text-align:center;
}

.line{
    width:120px;
    height:1px;
    background:#d8cbb5;
    margin:35px auto 50px;
}

/* TOP */
.hero{
    display:flex;
    justify-content:center;
    position:relative;
}

.hero img{
    height:520px;
    width:auto;
}

/* 丸テキスト */
.circle{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:320px;
    height:320px;
    border-radius:50%;
    background:rgba(255,250,205,0.3);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:40px;
}

/* CONCEPT */
.concept{
    display:flex;
    justify-content:center;
    gap:80px;
    max-width:1100px;
    margin:auto;
}

.concept img{
    height:520px;
}

.concept p{
    width:400px;
    line-height:2;
}

/* フッター */
.footer{
    background:#2f3440;
    color:#fff;
    padding:100px;
    display:flex;
    justify-content:space-between;
}

/* =====================
   スマホ対応
===================== */
@media screen and (max-width: 768px){

header{
    height:auto;
    padding:15px;
    flex-direction:column;
    align-items:flex-start;
}

.logo img{
    height:80px;
}

.header-center{
    position:static;
    transform:none;
    margin-top:10px;
}

nav{
    font-size:16px;
    margin-top:10px;
}

.section{
    padding:120px 15px 60px;
}

/* TOP */
.hero{
    flex-direction:column;
}

.hero img{
    width:100%;
    height:auto;
}

.circle{
    position:static;
    transform:none;
    margin:20px auto;
    width:200px;
    height:200px;
    font-size:20px;
}

/* CONCEPT */
.concept{
    flex-direction:column;
    gap:20px;
}

.concept img{
    width:100%;
    height:auto;
}

.concept p{
    width:100%;
}

/* フッター */
.footer{
    flex-direction:column;
    gap:20px;
    padding:40px 20px;
}

}

</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="images/logo.png">
    </div>

    <div class="header-center">
        <div class="main-title">AYU SLIM</div>
        <div class="sub-title">BEAUTY SALON 痩身 小顔</div>
        <div class="certification">日本WEC認定</div>
    </div>

    <nav>
        <a href="#">TOP</a> /
        <a href="#">CONCEPT</a> /
        <a href="#">MENU</a>
    </nav>
</header>

<section class="section">
    <h2>TOP</h2>
    <div class="line"></div>

    <div class="hero">
        <img src="images/top1.jpg">
        <img src="images/top2.jpg">

        <div class="circle">
            内側から輝く<br>
            自信あふれる<br>
            理想の私へ
        </div>
    </div>
</section>

<section class="section">
    <h2>CONCEPT</h2>
    <div class="line"></div>

    <div class="concept">
        <img src="images/room.jpg">

        <p>
            小岩では珍しいバザルトストーン専門サロン。純金製痩身マシンTBS導入で、内側から美バスト・美ボディへ導きます。<br><br>
            バストアップ・痩身・小顔などのお悩みに、一回の施術から効果を実感していただけます。<br><br>
            肩こり・冷え・セル脂肪・むくみ・たるみなどをトータルサポートします。
        </p>
    </div>
</section>

<footer class="footer">
    <div>
        <img src="images/logo2.jpg" height="80">
        <p>Beauty Salon 痩身 小顔</p>
    </div>

    <div>
        <p>080-4084-2288</p>
    </div>
</footer>

</body>
</html>
