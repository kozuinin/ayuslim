<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYU SLIM</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Serif JP', serif;
    background:#f6f2eb;
    color:#2f2f2f;
}

/* =====================
   ヘッダー
===================== */
header{
    position:fixed;
    top:0;
    width:100%;
    padding:0 80px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:wheat;
    z-index:1000;
}

.logo img{
    height:125px;
}

.header-center{
    position:absolute;
    left:16.5%;
    top:50%;
    transform:translateY(-50%);
}

.header-center .main-title{
    font-size:33px;
    font-weight:700;
}

.header-center .sub-title{
    font-size:27px;
    font-weight:700;
}

.header-center .certification{
    font-size:15px;
}

nav.nav{
    font-size:25px;
    display:flex;
}

nav.nav a{
    text-decoration:none;
    color:#444;
}

nav.nav .sep{
    margin:0 10px;
}

/* ハンバーガー */
.menu-btn{
    display:none;
    font-size:26px;
    cursor:pointer;
}

/* =====================
   セクション
===================== */
.section{
    padding:200px 20px 100px;
    text-align:center;
}

.section h2{
    font-size:24px;
    letter-spacing:6px;
    color:#a8895f;
}

.line{
    width:120px;
    height:1px;
    background:#d8cbb5;
    margin:35px auto 50px;
}

/* =====================
   TOP
===================== */
.hero{
    display:flex;
    justify-content:center;
}

.hero-images img{
    height:520px;
}

/* =====================
   CONCEPT
===================== */
.concept{
    display:flex;
    gap:90px;
    justify-content:center;
}

.concept img{
    height:520px;
}

.concept p{
    width:420px;
    line-height:2;
}

/* =====================
   スマホ
===================== */
@media screen and (max-width:768px){

/* ヘッダーを横3分割 */
header{
    padding:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

/* ロゴ */
.logo img{
    height:50px;
}

/* 中央タイトル */
.header-center{
    position:static;
    transform:none;
    text-align:center;
    flex:1;
}

.header-center .main-title{
    font-size:18px;
}

.header-center .sub-title{
    font-size:12px;
}

.header-center .certification{
    display:none;
}

/* ハンバーガー表示 */
.menu-btn{
    display:block;
}

/* ナビ隠す */
nav.nav{
    display:none;
    position:absolute;
    top:70px;
    right:10px;
    background:#fff;
    flex-direction:column;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 開いたとき */
nav.nav.active{
    display:flex;
}

nav.nav a{
    padding:10px 0;
}

/* セクション */
.section{
    padding:120px 15px 60px;
}

/* 画像 */
.hero{
    flex-direction:column;
}

.hero-images img{
    width:100%;
    height:auto;
}

.concept{
    flex-direction:column;
}

.concept img{
    width:100%;
    height:auto;
}

.concept p{
    width:100%;
}

}

</style>
</head>

<body>

<header>

    <div class="logo">
        <img src="./images/logo.png">
    </div>

    <div class="header-center">
        <div class="main-title">AYU SLIM</div>
        <div class="sub-title">Beauty Salon 痩身・小顔</div>
        <div class="certification">☆★ 日本WEC認定･バザルトストーンサロン★☆</div>
    </div>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <nav class="nav">
        <a href="#" onclick="toggleMenu()">TOP</a>
        <a href="#" onclick="toggleMenu()">CONCEPT</a>
        <a href="#" onclick="toggleMenu()">MENU</a>
    </nav>

</header>

<section class="section">
    <h2>TOP</h2>
    <div class="line"></div>

    <div class="hero">
        <div class="hero-images">
            <img src="./images/top1.jpg">
            <img src="./images/top2.jpg">
        </div>
    </div>
</section>

<section class="section">
    <h2>CONCEPT</h2>
    <div class="line"></div>

    <div class="concept">
        <img src="./images/room.jpg">
        <p>コンセプトテキスト</p>
    </div>
</section>

<script>
function toggleMenu(){
    document.querySelector(".nav").classList.toggle("active");
}
</script>

</body>
</html>
