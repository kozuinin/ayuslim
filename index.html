<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYU SLIM</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Serif JP', serif;
    background:#f6f2eb;
    color:#2f2f2f;
}

/* =====================
   ヘッダー
===================== */
header{
    position:fixed;
    top:0;
    width:100%;
    height:140px;
    padding:0 80px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:wheat;
    z-index:1000;
}

.logo img{
    height:125px;
    width:auto;
}

.header-center{
    position:absolute;
    left:16.5%;
    top:50%;
    transform:translateY(-50%);
    text-align:left;
}

.header-center .main-title{
    font-size:33px;
    font-weight:700;
}

.header-center .sub-title{
    font-size:27px;
    font-weight:700;
    margin-top:4px;
}

.header-center .certification{
    font-size:15px;
    margin-top:6px;
}

nav.nav{
    font-size:25px;
    display:flex;
    align-items:center;
}

nav.nav a{
    color:#444;
    text-decoration:none;
}

nav.nav .sep{
    margin:0 12px;
    color:#888;
}

/* =====================
   セクション
===================== */
.section{
    padding:200px 20px 100px;
    text-align:center;
}

.section h2{
    font-size:24px;
    letter-spacing:6px;
    color:#a8895f;
}

.line{
    width:120px;
    height:1px;
    background:#d8cbb5;
    margin:35px auto 50px;
}

/* =====================
   TOP
===================== */
.hero{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero-images{
    display:flex;
    gap:0;
    font-size:0;
}

.hero-images img{
    height:520px;
    width:auto;
    display:block;
}

.circle{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:320px;
    height:320px;

    background:rgba(255,250,205,0.3);
    backdrop-filter: blur(11px);
    -webkit-backdrop-filter: blur(11px);

    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;

    font-size:46px;
    color:#9D6C3F;
    text-align:center;
}
