<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYU SLIM</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Serif JP', serif;
    background:#f6f2eb;
    color:#2f2f2f;
}

/* =====================
   ヘッダー
===================== */
header{
    position:fixed;
    top:0;
    width:100%;
    height:140px;
    padding:0 80px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:wheat;
    z-index:1000;
}

.logo img{
    height:125px;
}

.header-center{
    position:absolute;
    left:16.5%;
    top:50%;
    transform:translateY(-50%);
}

.header-center .main-title{
    font-size:33px;
    font-weight:700;
}

.header-center .sub-title{
    font-size:27px;
    font-weight:700;
}

.header-center .certification{
    font-size:15px;
}

nav.nav{
    font-size:25px;
    display:flex;
}

nav.nav a{
    text-decoration:none;
    color:#444;
}

/* =====================
   セクション
===================== */
.section{
    padding:180px 20px 100px; /* ←少し調整 */
    text-align:center;
}

/* =====================
   TOP
===================== */
.hero{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero-images{
    display:flex;
}

.hero-images img{
    height:520px;
}

/* ★ 修正：円は常に中央 */
.circle{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:320px;
    height:320px;
    background:rgba(255,250,205,0.3);
    backdrop-filter: blur(11px);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:46px;
    color:#9D6C3F;
    text-align:center;
}

/* =====================
   CONCEPT
===================== */
.concept{
    display:flex;
    gap:90px;
    justify-content:center;
}

.concept img{
    height:520px;
}

.concept p{
    width:420px;
    line-height:2;
}

/* =====================
   FOOTER（そのまま）
===================== */
/* 省略なしでそのまま使ってOK */

/* =====================
   スマホ修正（重要）
===================== */
@media screen and (max-width:768px){

/* ヘッダー高さ変動に対応 */
header{
    height:auto;
    padding:10px;
}

/* 星消す */
.header-center .certification{
    display:none;
}

/* セクション余白をヘッダーに合わせる */
.section{
    padding-top:160px;
}

/* 画像縦 */
.hero{
    flex-direction:column;
}

.hero-images{
    flex-direction:column;
}

.hero-images img{
    width:100%;
    height:auto;
}

/* ★ ここが本質修正 */
.hero{
    position:relative;
}

/* 円はそのまま中央固定（消さない） */
.circle{
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    width:180px;
    height:180px;
    font-size:18px;
}

/* CONCEPT */
.concept{
    flex-direction:column;
}

.concept img{
    width:100%;
    height:auto;
}

.concept p{
    width:100%;
}

}

</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="./images/logo.png">
    </div>

    <div class="header-center">
        <div class="main-title">AYU SLIM</div>
        <div class="sub-title">BEAUTY SALON 痩身 小顔</div>
        <div class="certification">☆★ 日本WEC認定･バザルトストーンサロン★☆</div>
    </div>

    <nav class="nav">
        <a href="#">TOP</a> /
        <a href="#">CONCEPT</a> /
        <a href="#">MENU</a>
    </nav>
</header>

<section class="section">
    <h2>TOP</h2>
    <div class="line"></div>

    <div class="hero">
        <div class="hero-images">
            <img src="./images/top1.jpg">
            <img src="./images/top2.jpg">
        </div>

        <div class="circle">
            内側から輝く<br>
            自信あふれる<br>
            理想の私へ
        </div>
    </div>
</section>

<section class="section">
    <h2>CONCEPT</h2>
    <div class="line"></div>

    <div class="concept">
        <img src="./images/room.jpg">
        <p>
            小岩では珍しいバザルトストーン専門サロン。純金製痩身マシンTBS導入で、内側から美バスト・美ボディへ導きます。<br><br>
            バストアップ・痩身・小顔などのお悩みに、一回の施術から効果を実感していただけます。<br><br>
            肩こり・冷え・セル脂肪・むくみ・たるみなどをトータルサポートします。
        </p>
    </div>
</section>

</body>
</html>
